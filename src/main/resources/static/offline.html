<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технічна пауза | MMC</title>

    <script>
        (function() {
            var savedTheme = localStorage.getItem('app-theme');
            var customHue = localStorage.getItem('custom-hue');
            var customSat = localStorage.getItem('custom-sat');

            if (!savedTheme) {
                document.documentElement.setAttribute('data-theme', 'custom');
                document.documentElement.style.setProperty('--theme-h', '210');
                document.documentElement.style.setProperty('--theme-s', '5%');
            } else {
                document.documentElement.setAttribute('data-theme', savedTheme);
                if (savedTheme === 'custom' && customHue) {
                    document.documentElement.style.setProperty('--theme-h', customHue);
                    document.documentElement.style.setProperty('--theme-s', customSat || '75%');
                }
            }
        })();
    </script>

    <style>
        :root {
            --bg-body: hsl(var(--theme-h, 210), var(--theme-s, 5%), 96%);
            --card-bg: hsl(var(--theme-h, 210), var(--theme-s, 5%), 100%);
            --text-main: hsl(var(--theme-h, 210), var(--theme-s, 5%), 15%);
            --text-muted: hsl(var(--theme-h, 210), var(--theme-s, 5%), 45%);
            --border-color: hsl(var(--theme-h, 210), var(--theme-s, 5%), 85%);
            font-family: system-ui, -apple-system, sans-serif;
        }

        [data-theme="custom"] {
            --bg-body: hsl(var(--theme-h), var(--theme-s), 10%);
            --card-bg: hsl(var(--theme-h), var(--theme-s), 15%);
            --text-main: hsl(var(--theme-h), var(--theme-s), 90%);
            --text-muted: hsl(var(--theme-h), var(--theme-s), 60%);
            --border-color: hsl(var(--theme-h), var(--theme-s), 25%);
        }

        body {
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .offline-card {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 0.5rem;
            border: 0.0625rem solid var(--border-color);
            box-shadow: 0 0.25rem 0.375rem -0.0625rem rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 31.25rem;
            width: 90%;
        }

        h2 { margin-top: 0; font-size: 1.5rem; margin-bottom: 1rem; }
        p { line-height: 1.5; margin-bottom: 1rem; }
        .text-muted { color: var(--text-muted); font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }

        hr {
            border: none;
            border-top: 0.0625rem solid var(--border-color);
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>

<div class="offline-card">
    <h2>🛠 Технічна пауза</h2>
    <p>Зв'язок із сервером тимчасово втрачено.</p>
    <p class="text-muted">Це не ви, це інтернет-з'єднання нашого серверу. Ми вже очікуємо на відновлення.</p>

    <hr>

    <p class="text-xs text-muted">З повагою,<br><strong>Адміністрація Mental Management Center</strong></p>
</div>

<script>
    setInterval(async () => {
        try {
            const response = await fetch('/', { method: 'HEAD', cache: 'no-cache' });
            if (response.ok) window.location.reload();
        } catch (e) {
        }
    }, 10000);
</script>
</body>
</html>
