spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/psychotherapy
    username: postgres
    password: admin  # ПЕРЕВІР СВІЙ ПАРОЛЬ ТУТ
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  forward-headers-strategy: framework

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:}
  oauth2:
    google:
      client-id: ${OAUTH2_GOOGLE_CLIENT_ID:}
      client-secret: ${OAUTH2_GOOGLE_CLIENT_SECRET:}
    facebook:
      client-id: ${OAUTH2_FACEBOOK_CLIENT_ID:}
      client-secret: ${OAUTH2_FACEBOOK_CLIENT_SECRET:}
