<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{})}">
<head>
    <meta charset="UTF-8">
    <title>Бардачок | Вхідні заявки</title>
</head>
<body>
<section class="standard-container standard-container-wide requests-shell">
    <div class="dashboard-hero-card">
        <div class="hero-top-row">
            <div class="hero-text-block">
                <h1 class="page-title-accent">Журнал звернень</h1>
                <p class="hero-description">Системний реєстр вхідних запитів та зворотного зв'язку.</p>
            </div>

            <div class="hero-global-actions">
                <a href="/admin/users" class="btn-outline">⬅ Назад</a>
            </div>
        </div>
    </div>
    <div class="table-scroll">
    <table class="data-table">
        <thead>
    <tr>
        <th><a th:href="@{/requests(sort='status')}" style="text-decoration: none; color: inherit;">Статус ↕</a></th>
        <th><a th:href="@{/requests(sort='name')}" style="text-decoration: none; color: inherit;">Відправник ↕</a></th>
        <th><a th:href="@{/requests(sort='contact')}" style="text-decoration: none; color: inherit;">Зв'язок ↕</a></th>
        <th>Повідомлення</th>
        <th><a th:href="@{/requests(sort='date')}" style="text-decoration: none; color: inherit;">Дата ↕</a></th>
        <th>Дії</th>
    </tr>
    </thead>

        <tbody>
        <th:block th:each="req : ${requests}">
            <!-- Прибрали inline-стиль cursor, перенесемо його в CSS -->
            <tr th:attr="data-target='reply-' + ${req.id}" onclick="toggleReply(this)" class="clickable-row">
                <td th:text="${req.status != null ? req.status.name() : 'NEW'}">Статус</td>
                <td th:text="${req.name}">Ім'я</td>
                <td th:text="${req.contact}">Контакт</td>
                <td class="msg">
                    <!-- Коротке повідомлення (видиме за замовчуванням) -->
                    <span class="msg-short" th:text="${#strings.abbreviate(req.message, 50)}">Повідомлення</span>

                    <!-- Довге повідомлення (приховане за замовчуванням класом is-hidden, БЕЗ інлайн display) -->
                    <span class="msg-full is-hidden"
                          th:if="${req.message.length() > 50}"
                          th:text="${req.message}"></span>
                </td>
                <td th:text="${#temporals.format(req.createdAt, 'dd.MM.yyyy HH:mm')}">Дата</td>
                <td>
                    <!-- Зупиняємо всплытие (propagation) кліку, щоб натискання на кнопку видалення не розгортало форму відповіді -->
                    <form th:action="@{/requests/delete/{id}(id=${req.id})}" method="post" onsubmit="return confirm('Видалити цей запис?')" onclick="event.stopPropagation();">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn-primary">Видалити</button>
                    </form>
                </td>
            </tr>

            <!-- Блок форми відповіді -->
            <tr th:id="'reply-' + ${req.id}" class="is-hidden reply-row">
                <td colspan="6">
                    <div class="reply-expanded-box">
                        <div th:if="${req.status != null and req.status.name() == 'ANSWERED'}">
                            <span class="reply-box-title">Ваша відповідь:</span>
                            <p class="reply-box-text" th:text="${req.adminReply}"></p>
                        </div>

                        <div th:if="${req.status == null or req.status.name() != 'ANSWERED'}">
                            <form th:action="@{/requests/{id}/reply(id=${req.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <textarea name="replyMessage" class="form-textarea" rows="2" placeholder="Ваша відповідь..." required></textarea>
                                <button type="submit" class="btn-primary btn-sm">Надіслати</button>
                            </form>
                        </div>
                    </div>
                </td>
            </tr>
        </th:block>
        </tbody>


    </table>
    </div>

    <script src="/js/requests.js" defer></script>
