<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Бардачок | Вхідні заявки</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="requests-page">

<h1 class="page-heading">Журнал звернень (Бардачок)</h1>

<table class="data-table">
    <thead>
    <tr>
        <th>Статус</th>
        <th>Відправник</th>
        <th>Зв'язок</th>
        <th>Повідомлення</th>
        <th>Дата</th>
        <th>Дії</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="req : ${requests}"
        th:classappend="${req.clientRequest} ? 'row-priority-client' : ''">

        <td>
            <span class="badge"
                  th:classappend="${req.clientRequest} ? 'badge-client' : 'badge-guest'"
                  th:text="${req.roleLabel}">
            </span>
        </td>

        <td>
            <span th:text="${req.senderName}"
                  th:style="${req.user != null} ? 'font-weight: bold;' : 'font-style: italic;'"></span>
        </td>

        <td>
            <div class="contact-actions">
                <a th:if="${req.smsContact != null}"
                   th:href="'sms:' + ${req.smsContact}"
                   class="btn-action-sms" title="Написати СМС">✉️ СМС</a>

                <a th:if="${req.emailContact != null}"
                   th:href="'mailto:' + ${req.emailContact}"
                   class="btn-action-email" title="Надіслати лист">📧 Email</a>
            </div>
        </td>

        <td th:text="${req.message}" class="data-table-message"></td>

        <td th:text="${#temporals.format(req.createdAt, 'dd.MM.yyyy HH:mm')}"></td>

        <td>
            <form th:action="@{/requests/delete/{id}(id=${req.id})}" method="post" onsubmit="return confirm('Видалити цей запис?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn-delete-small">Видалити</button>
            </form>
        </td>
    </tr>

    <tr th:if="${#lists.isEmpty(requests)}">
        <td colspan="6" class="empty-state">У бардачку поки порожньо. Спокійний день!</td>
    </tr>
    </tbody>
</table>

<div class="admin-navigation">
    <a href="/admin/users" class="back-link">← До списку користувачів</a>
    <a href="/" class="back-link">На головну</a>
</div>

</body>
</html>
