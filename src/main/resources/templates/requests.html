<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{})}">
<head>
    <meta charset="UTF-8">
    <title>Бардачок | Вхідні заявки</title>
</head>
<body>
<section class="card-container">

    <div class="dashboard-hero-v2">
        <div class="hero-left-text">
            <h1 class="page-title-accent">Журнал звернень</h1>
            <p class="article-excerpt">Усі повідомлення з контактної форми, відсортовані за датою.</p>
        </div>
        <a href="/admin/users" class="btn-ui">До адмінки</a>
    </div>

    <div class="table-scroll">
        <table class="data-table">
            <thead>
            <tr>
                <th>Статус</th>
                <th>Відправник</th>
                <th>Зв'язок</th>
                <th>Повідомлення</th>
                <th>Дата</th>
                <th style="width: 1%;">Дії</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="req : ${requests}"
                th:classappend="${req.clientRequest} ? 'row-priority-client' : ''">

                <td>
                    <span class="badge"
                          th:classappend="${req.clientRequest} ? 'badge-client' : 'badge-guest'"
                          th:text="${req.roleLabel}">
                    </span>
                </td>

                <td class="sender-cell">
                    <span th:text="${req.senderName}"
                          th:classappend="${req.user != null} ? 'request-sender-registered' : 'request-sender-guest'"></span>
                </td>

                <td>
                    <div class="admin-controls-wrapper">
                        <a th:if="${req.smsContact != null}"
                           th:href="'sms:' + ${req.smsContact}"
                           class="btn-edit-sm" title="Написати СМС">✉️</a>

                        <a th:if="${req.emailContact != null}"
                           th:href="'mailto:' + ${req.emailContact}"
                           class="btn-edit-sm" title="Надіслати лист">📧</a>
                    </div>
                </td>

                <td>
                    <div class="admin-table-message-text" th:text="${req.message}"></div>
                </td>

                <td class="date-cell" th:text="${#temporals.format(req.createdAt, 'dd.MM.yyyy HH:mm')}"></td>

                <td>
                    <div class="admin-controls-wrapper">
                        <form th:action="@{/requests/delete/{id}(id=${req.id})}" method="post"
                              onsubmit="return confirm('Видалити цей запис?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn-delete-small" title="Видалити">🗑️</button>
                        </form>
                    </div>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(requests)}">
                <td colspan="6" class="empty-state">У бардачку поки порожньо. Спокійний день!</td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
