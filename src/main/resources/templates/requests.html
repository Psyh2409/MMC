<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список заявок | Панель керування</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="requests-page">

<h1 class="page-heading">Вхідні заявки на консультацію</h1>

<table class="data-table">
    <thead>
    <tr>
        <th>ID</th>
        <th>Ім'я клієнта</th>
        <th>Контактні дані</th>
        <th>Повідомлення / Запит</th>
        <th>Дата надходження</th>
        <th>Дії</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="req : ${requests}">
        <td th:text="${req.id}" class="data-table-id">01</td>
        <td th:text="${req.name}" class="data-table-name">Ім'я</td>
        <td th:text="${req.contact}"></td>
        <td th:text="${req.message}" class="data-table-message"></td>
        <td th:text="${#temporals.format(req.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2024</td>
        <td>
            <a th:href="@{/requests/delete/{id}(id=${req.id})}"
               class="btn-delete btn-delete-link"
               onclick="return confirm('Ви впевнені, що хочете видалити цю заявку?')">
                Видалити
            </a>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(requests)}">
        <td colspan="6" class="empty-state">Наразі нових заявок немає.</td>
    </tr>
    </tbody>
</table>

<a href="/admin/users" class="back-link">← До списку користувачів</a>
<br>
<a href="/" class="back-link">На головну</a>

</body>
</html>
