<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{})}">
<head>
    <meta charset="UTF-8">
    <title>Бардачок | Вхідні заявки</title>
</head>
<body>
<section class="standard-container standard-container-wide requests-shell">
    <div class="dashboard-hero-card">
        <div class="hero-top-row">
            <div class="hero-text-block">
                <h1 class="page-title-accent">Журнал звернень</h1>
                <p class="hero-description">Системний реєстр вхідних запитів та зворотного зв'язку.</p>
            </div>

            <div class="hero-global-actions">
                <a href="/admin/users" class="btn-outline">⬅ Назад до користувачів</a>
            </div>
        </div>
    </div>
    <div class="table-scroll">
    <table class="data-table">
        <thead>
        <tr>
            <th>Статус</th>
            <th>Відправник</th>
            <th>Зв'язок</th>
            <th>Повідомлення</th>
            <th>Дата</th>
            <th>Дії</th>
        </tr>
        </thead>
        <tbody>
        <th:block th:each="req : ${requests}">

            <tr th:classappend="${req.status != null and req.status.name() == 'ANSWERED'} ? 'clickable-row' : ''"
                th:data-target="${req.status != null and req.status.name() == 'ANSWERED'} ? 'reply-' + ${req.id} : ''"
                onclick="toggleReply(this)">

                <td>
            <span class="badge"
                  th:classappend="${req.clientRequest} ? 'badge-client' : 'badge-guest'"
                  th:text="${req.roleLabel}">
            </span>
                </td>

                <td>
                    <span th:text="${req.name}"></span>
                </td>

                <td>
                    <div class="action-group">
                        <a th:if="${req.status == null or req.status.name() != 'ANSWERED'}"
                           th:href="@{/requests/{id}/reply(id=${req.id})}"
                           class="btn-primary">✍ Відповісти</a>

                        <span th:unless="${req.status == null or req.status.name() != 'ANSWERED'}" class="text-navigation text-sm">
                            <th:block th:if="${req.contact != null}">
                                📧 <span th:text="${req.contact}"></span>
                            </th:block>
                            <th:block th:if="${req.contact == null and req.smsContact != null}">
                                📱 <span th:text="${req.smsContact}"></span>
                            </th:block>
                        </span>
                    </div>
                </td>

                <td th:text="${req.message}" class="data-table-message"></td>

                <td th:text="${#temporals.format(req.createdAt, 'dd.MM.yyyy HH:mm')}"></td>

                <td>
                    <form th:action="@{/requests/delete/{id}(id=${req.id})}" method="post" onsubmit="return confirm('Видалити цей запис?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn-primary">Видалити</button>
                    </form>
                </td>
            </tr>

            <tr th:if="${req.status != null and req.status.name() == 'ANSWERED'}"
                th:id="'reply-' + ${req.id}"
                class="is-hidden">
                <td colspan="6">
                    <div class="reply-expanded-box">
                        <span class="reply-box-title">Ваша відповідь користувачу:</span>
                        <p class="reply-box-text" th:text="${req.adminReply}"></p>
                    </div>
                </td>
            </tr>

        </th:block>
        </tbody>
    </table>
    </div> <script>
    function toggleReply(element) {
        // element — це той самий тег <tr>, на який ти клікнув мишкою
        // .closest('tr') гарантує, що ми схопимо рядок, навіть якщо клік був по тексту всередині
        const row = element.closest('tr');

        // Витягуємо значення data-target (наприклад, "reply-uuid-123")
        const targetId = row.getAttribute('data-target');
        if (!targetId) return; // Якщо атрибута немає (рядок "Нове") — зупиняємо роботу

        // Шукаємо під таблицею прихований рядок з таким ID
        const replyRow = document.getElementById(targetId);
        if (replyRow) {
            // Перемикаємо стан: якщо клас is-hidden є — прибираємо (показуємо текст), якщо немає — додаємо (ховаємо)
            replyRow.classList.toggle('is-hidden');
        }
    }
</script>
</section> </body>
</html>
