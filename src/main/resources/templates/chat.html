<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(
        ~{::title},
        ~{::#chat-content},
        ~{::#chat-scripts}
      )}">
<head>
    <title>Спільний простір MMC</title>
</head>
<body>

<div id="chat-content">
    <div class="standard-container">
        <h2 class="section-title">Спільний простір MMC</h2>

        <div id="chat-panel" class="chat-wrapper">
            <div id="chat-messages" class="chat-window">
            </div>

            <form id="messageForm" class="chat-form">
                <input type="text" id="messageInput" class="form-input" placeholder="Напишіть повідомлення..." autocomplete="off" required>
                <button type="submit" class="btn-primary">Надіслати</button>
            </form>
        </div>
    </div>
</div>

<th:block id="chat-scripts">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <meta name="current-user" th:content="${#authentication.name}" />
    <script th:src="@{/js/chat.js}"></script>
</th:block>

</body>
</html>
