<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Kontrollzentrum - Kunden</title>
    <style>
        body {
            background-color: #f5f5dc;
            font-family: 'Segoe UI', serif;
            color: #4e342e;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }
        th {
            background-color: #8d6e63;
            color: white;
            padding: 12px;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #d7ccc8;
        }
        .btn-delete {
            background-color: #b71c1c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div style="
        display: flex;
        gap: 20px;
        margin-bottom: 20px;">
        <div style="
            background: #efebe9;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #8d6e63;">
            <strong>Leser (USER): </strong> <span th:text="${countUsers}">0</span>
        </div>
        <div style="
            background: #f1f8e9;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #2e7d32;">
            <strong>In der Therapie (CLIENT): </strong> <span th:text="${countClients}">0</span>
        </div>
        <div style="
            background: #fff8e1;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #ffa000;">
            <strong>Gäste : </strong> <span th:text="${totalVisits}">0</span>
        </div>
    </div>
    <h2>Liste der registrierten Benutzer</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>E-Mail</th>
                <th>Rolle</th>
                <th>Datum der Registrierung</th>
                <th>Notizen des Therapeuten (vertaulich)</th>
                <th>Wirkung</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${allUsers}">
                <td th:text="${u.id}"></td>
                <td th:text="${u.name}"></td>
                <td th:text="${u.email}"></td>
                <td>
                    <span th:text="${u.role}">USER</span>
                    <form th:if="${u.role == 'USER'}" th:action="@{/admin/promote/{id}(id=${u.id})}" method="post" style="margin-top: 5px;">
                        <button type="submit" style="background-color: #8d6e63; color: white; border: none; font-size: 0.8em; padding: 4px; border-radius: 3px; cursor: pointer;">
                            Zum Kunden machen
                        </button>
                    </form>
                </td>
                <td th:text="${#temporals.format(u.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2024</td>
                <td>
                    <form th:action="@{/admin/update-notes/{id}(id=${u.id})}" method="post">
                        <textarea name="notes"
                                  th:text="${u.adminNotes}"
                                  placeholder="Hinterlasse hier einen Kommentar zu diesem Nutzer"
                                  style="width: 150px; height: 50px; background-color: #fff9f0; border: 1px solid #d7ccc8; border-radius: 4px;"></textarea>
                        <br>
                        <button type="submit" style="background-color: #5d4037; color: white; border: none; font-size: 0.7em; padding: 3px 8px; border-radius: 3px; cursor: pointer; margin-top: 3px;">
                        Speichern
                        </button>
                    </form>
                </td>
                <td>
                    <form th:if="${u.role != 'ADMIN' and u.role != 'CLIENT'}"
                            th:action="@{/admin/delete/{id}(id=${u.id})}" method="post">
                        <button type="submit" class="btn-delete" onclick="return confirm(
                            'Sind Sie sicher, dass Sie Eintrag löschen möchten??')">
                            Löschen
                        </button>
                    </form>
                    <span th:if="${u.role == 'ADMIN'}"
                          style="color: #8d6e63; font-style: italic;">
                        Das it Sie
                    </span>
                    <span th:if="${u.role == 'CLIENT'}"
                          style="color: #2e7d32; font-weight: bold; border: 1px solid #2e7d32; padding: 2px 5px; border-radius: 3px;">
                        IN DER THERAPIE
                    </span>
                </td>
            </tr>
        </tbody>
    </table>
    <br>
    <a href="/">Zurück zur Startseite</a>
</body>
</html>
