<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{::page-scripts})}">
<head>
    <meta charset="UTF-8">
    <title>Центр керування — Клієнти</title>
</head>
<body>
<section class="page-main admin-shell">
    <div class="dashboard-hero-v2">
        <button th:onclick="|window.location.href='@{/admin/articles}'|" class="btn-ui nav-btn-left">📝 Статті</button>

        <div class="hero-center-text">
            <h2 class="page-title-accent">Центр керування</h2>
            <p class="article-meta">Робочий простір фахівця</p>
        </div>

        <button th:onclick="|window.location.href='@{/requests}'|" class="btn-ui nav-btn-right">📂 Бардачок</button>
    </div>

    <div class="admin-stats-row">
        <div class="stat-item"><strong>Читачі:</strong> <span th:text="${countUsers}">0</span></div>
        <div class="stat-item"><strong>У терапії:</strong> <span th:text="${countClients}">0</span></div>
        <div class="stat-item"><strong>Візити:</strong> <span th:text="${totalVisits}">0</span></div>
    </div>

    <div class="filter-bar-center">
        <button onclick="filterTable('ALL')" class="btn-ui" type="button">Всі</button>
        <button onclick="filterTable('ADMIN')" class="btn-ui" type="button">Адмін</button>
        <button onclick="filterTable('THERAPIST')" class="btn-ui" type="button">Колеги</button>
        <button onclick="filterTable('CLIENT')" class="btn-ui" type="button">Клієнти</button>
        <button onclick="filterTable('READER')" class="btn-ui" type="button">Читачі</button>
    </div>

    <div class="table-scroll">
        <table>
            <thead>
            <tr>
                <th class="col-optional">ID</th>
                <th>Ім'я</th>
                <th>E-mail</th>
                <th>Роль</th>
                <th class="col-optional">Дата реєстрації</th>
                <th>Нотатки терапевта (конфіденційно)</th>
                <th>Дії</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${allUsers}" th:attr="data-role=${u.primaryRoleName}">
                <td class="uuid-cell col-optional">
                    <th:block th:if="${u != null and u.id != null}">
                        <span class="uuid-text" th:text="${u.id}">ID</span>
                        <button type="button" class="btn-edit-sm"
                                th:attr="onclick=|copyToClipboard('${u.id}')|" title="Копіювати UUID">
                            📑
                        </button>
                    </th:block>
                </td>
                <td th:text="${u.name}"></td>
                <td th:text="${u.email}"></td>

                <td>
                    <span th:text="${u.isAdmin() ? 'АДМІН' : (u.isTherapist() ? 'ТЕРАПЕВТ' : (u.isClient() ? 'КЛІЄНТ' : 'ЧИТАЧ'))}" class="role-badge-text"></span>

                    <form th:if="${!u.isClient() and !u.isAdmin() and !u.isTherapist()}"
                          th:action="@{/admin/promote/{id}(id=${u.id})}"
                          method="post" class="form-promote">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn-ui btn-sm">Працює</button>
                    </form>
                </td>

                <td class="col-optional" th:text="${#temporals.format(u.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2024</td>

                <td>
                    <form th:action="@{/admin/update-notes/{id}(id=${u.id})}" method="post" class="form-notes">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <textarea name="notes"
                                  th:text="${u.adminNotes}"
                                  placeholder="Додайте коментар..."
                                  class="admin-notes"></textarea>
                        <button type="submit" class="btn-ui btn-sm form-notes-btn">Зберегти</button>
                    </form>
                </td>

                <td>
                    <div class="admin-controls-wrapper" th:if="${!u.isAdmin()}">

                        <form th:action="@{/admin/toggle-status/{id}(id=${u.id})}" method="post">
                            <button type="submit" class="btn-toggle"
                                    th:title="${u.enabled} ? 'Сайт: OK' : 'Сайт: БАН'">
                                <span th:text="${u.enabled} ? '🌐' : '🚫'"></span>
                            </button>
                        </form>

                        <form th:action="@{/admin/toggle-chat/{id}(id=${u.id})}" method="post">
                            <button type="submit" class="btn-toggle"
                                    th:title="${u.chatEnabled} ? 'Чат: OK' : 'Чат: БАН'">
                                <span th:text="${u.chatEnabled} ? '💬' : '🔇'"></span>
                            </button>
                        </form>

                        <form th:action="@{/admin/toggle-comments/{id}(id=${u.id})}" method="post">
                            <button type="submit" class="btn-toggle"
                                    th:title="${u.commentsEnabled} ? 'Коментарі: OK' : 'Коментарі: БАН'">
                                <span th:text="${u.commentsEnabled} ? '📝' : '🔕'"></span>
                            </button>
                        </form>

                        <form th:action="@{/admin/delete/{id}(id=${u.id})}" method="post" onsubmit="return confirm('Видалити назавжди?')">
                            <button type="submit" class="btn-delete-small" title="Видалити акаунт">🗑️</button>
                        </form>
                    </div>

                    <span th:if="${u.isAdmin()}" class="admin-badge-self">Адміністратор (Ви)</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
<th:block th:fragment="page-scripts">
    <script th:src="@{/js/admin.js}"></script>
</th:block>
</body>
</html>
