<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
    <title>Psychotherapie</title>
    <meta charset="UTF-8">
</head>
<body>
    <h1>Willkommen auf der Website fur Psychotherapie</h1>
    <h1 th:text="${message}"></h1>

    <div th:if="${userName != null}">
        <p>Sie haben sich angemeldet als: <strong th:text="${userName}">Gast</strong></p>
        <p>Sein Status: <span th:text="${userRole}">Rolle</span></p>
        <div th:if="${userRole == 'ADMIN'}" style="border: 2px solid red; padding: 15px; margin-top: 20px;">
            <h2 style="color: red;">ADMINISTRATORBEREICH</h2>
            <p>Guten Tag, Herr Psychotherapeut! Hier sind seine Arbeitsutensilien.</p>
            <a href="/admin/users" style="display: inline-block; background: #007bff; color: white; padding: 10px; text-decoration: none; border-radius: 5px;">
                Liste aller Kunden anzeigen
            </a>
        </div>

        <form th:action="@{/logout}" method="post">
            <button type="submit" style="background-color: #dc3545; color: white; border: none; padding: 8px 16px; cursor: pointer;">
                Abmelden
            </button>
        </form>
    </div>

    <div th:unless="${userName != null}">
        <h2>Hallo! Bitte melden Sie sich an:</h2>
        <p>
            <a href="/login" style="padding: 10px; background: #28a745; color: white; text-decoration: none; border-radius: 4px;">Anmelden</a>
            oder
            <a href="/register" style="padding: 10px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px;">Registrieren</a>
        </p>
    </div>
</body>
</html>
