<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(
      ~{::title},
      ~{::section.standard-container-wide},
      ~{::script}
      )}">
<head>
    <title>Конструктор статті | MMC</title>
</head>
<body>

<section class="standard-container standard-container-wide form-group">
    <header class="section-header">
        <h1 class="page-title-accent">Створення матеріалу</h1>
        <p class="heading-lg">Заповніть поля для публікації в базу знань</p>
    </header>

    <div class="article-card">
        <form th:action="@{/admin/articles/create}" th:object="${articleForm}" method="post">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="title">Назва статті:</label>
                <input type="text" id="title" th:field="*{title}" class="form-input" placeholder="Заголовок...">
                <p class="error-text" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
            </div>

            <div class="form-group">
                <label for="description">Короткий опис (анонс):</label>
                <textarea id="description" th:field="*{description}" class="form-input" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="categorySelector">Тематичний розділ:</label>
                <select id="categorySelector" class="form-input" onchange="syncCategory(this)">
                    <option value="">-- Оберіть існуючий розділ --</option>

                    <option th:each="cat : ${categories}"
                            th:value="${cat.categorySlug}"
                            th:text="${cat.displayName}">Назва розділу</option>

                    <option value="NEW">+ Додати новий тематичний розділ...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="tags">Теги (через кому):</label>
                <input type="text" id="tags" th:field="*{tags}" class="form-input" placeholder="стрес, ресурс, дихання">
            </div>

            <div class="form-group">
                <label>Додати ілюстрації, карти або графіки для цієї статті:</label>

                <div id="dropZone" class="file-drop-zone">
                    <span class="drop-zone-icon">📁</span>
                    <p>Перетягніть ілюстрації сюди або <span class="file-drop-zone-trigger">клікніть для вибору</span></p>
                    <span class="helper-text">Дозволені формати: зображення (карти, схеми) або відео. До 10 МБ.</span>

                    <input type="file" id="asyncMediaFile" class="visually-hidden-input" accept="image/*,video/*" multiple>
                </div>

                <div id="mediaUploadQueue" class="media-queue"></div>
            </div>

            <div class="form-group">
                <label for="content">Основний текст статті:</label>
                <textarea id="content" th:field="*{content}" class="form-input" rows="15"></textarea>
                <p class="error-text" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Опублікувати</button>
                <a th:href="@{/admin/articles}" class="btn-outline">Скасувати</a>
            </div>
        </form>
    </div>
</section>

<script>
    // 1. СИНХРОНІЗАЦІЯ КАТЕГОРІЙ (Твій базовий інструмент)
    function syncCategory(select) {
        const slugInput = document.getElementById('finalCategory');
        const nameInput = document.getElementById('finalCategoryNameUa');

        if (!slugInput || !nameInput) return;

        if (select.value === 'NEW') {
            slugInput.classList.remove('hidden-category-field');
            nameInput.classList.remove('hidden-category-field');
            slugInput.value = '';
            nameInput.value = '';
            slugInput.focus();
        } else if (select.value !== "") {
            slugInput.classList.add('hidden-category-field');
            nameInput.classList.add('hidden-category-field');

            slugInput.value = select.value;
            nameInput.value = select.options[select.selectedIndex].text;
        } else {
            slugInput.classList.add('hidden-category-field');
            nameInput.classList.add('hidden-category-field');
            slugInput.value = '';
            nameInput.value = '';
        }
    }

    // 2. ГОЛОВНИЙ ОБРОБНИК СТОРІНКИ ПІСЛЯ ЗАВАНТАЖЕННЯ
    document.addEventListener('DOMContentLoaded', function() {

        // Частина А: Авто-підтягування тематичного розділу при редагуванні
        const selector = document.getElementById('categorySelector');
        const slugInput = document.getElementById('finalCategory');

        if (selector && slugInput && slugInput.value) {
            selector.value = slugInput.value;

            if (selector.value !== slugInput.value && slugInput.value !== '') {
                selector.value = 'NEW';
                syncCategory(selector);
            }
        }

        // Частина Б: Асинхронне завантаження медіафайлів та Drag-and-Drop
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('asyncMediaFile');
        const uploadQueue = document.getElementById('mediaUploadQueue');
        const csrfToken = document.querySelector('input[name="_csrf"]')?.value;

        if (dropZone && fileInput && uploadQueue) {

            // Клік по зоні активує вибір файлів через провідник
            dropZone.addEventListener('click', () => fileInput.click());

            // Візуальні ефекти при наведенні файлу мишкою над зону
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    dropZone.classList.add('drag-over');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    dropZone.classList.remove('drag-over');
                }, false);
            });

            // Обробка події, коли файли просто кинули мишкою в зону
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                const dt = e.dataTransfer;
                if (dt && dt.files.length > 0) {
                    handleFilesUpload(dt.files);
                }
            });

            // Обробка події класичного вибору файлів через вікно
            fileInput.addEventListener('change', () => {
                if (fileInput.files.length > 0) {
                    handleFilesUpload(fileInput.files);
                }
            });

            // Головна функція завантаження черги файлів
            function handleFilesUpload(files) {
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];

                    const formData = new FormData();
                    formData.append('file', file);

                    // Створюємо рядок статусу
                    const progressRow = document.createElement('div');
                    progressRow.className = 'media-item-row';
                    progressRow.innerHTML = `<span>Завантаження ${file.name}...</span>`;
                    uploadQueue.appendChild(progressRow);

                    fetch('/api/media/upload', {
                        method: 'POST',
                        headers: { 'X-CSRF-TOKEN': csrfToken },
                        body: formData
                    })
                    .then(response => {
                        if (!response.ok) throw new Error('Помилка сервера');
                        return response.json();
                    })
                    .then(data => {
                        const imgTag = `<img src="${data.url}" class="article-illustration" alt="${file.name}">`;

                        // Генеруємо чисту розмітку без брудних інлайн-скриптів onclick
                        progressRow.innerHTML = `
                            <span class="media-item-name">${file.name}</span>
                            <input type="text" class="form-input media-item-input" value='${imgTag}' readonly>
                            <button type="button" class="btn-primary btn-sm copy-btn">Копіювати код</button>
                        `;

                        // Знаходимо наші свіжостворені елементи в DOM
                        const inputEl = progressRow.querySelector('.media-item-input');
                        const btnEl = progressRow.querySelector('.copy-btn');

                        // При кліку на інпут — виділяємо весь текст
                        if (inputEl) {
                            inputEl.addEventListener('click', () => inputEl.select());
                        }

                        // Безпечний, залізобетонний клік на кнопку через Clipboard API
                        if (btnEl) {
                            btnEl.addEventListener('click', () => {
                                navigator.clipboard.writeText(imgTag).then(() => {
                                    // Елегантний UX: міняємо текст і додаємо твій клас успіху
                                    const originalText = btnEl.textContent;
                                    btnEl.textContent = 'Скопійовано! ✓';
                                    btnEl.classList.add('btn-success');

                                    // Через 2 секунди повертаємо кнопку в початковий стан
                                    setTimeout(() => {
                                        btnEl.textContent = originalText;
                                        btnEl.classList.remove('btn-success');
                                    }, 2000);
                                }).catch(err => {
                                    console.error('Помилка кліпборду: ', err);
                                });
                            });
                        }
                    })
                    .catch(error => {
                        progressRow.innerHTML = `<span class="error-text">Помилка завантаження ${file.name}: ${error.message}</span>`;
                    });
                }
                // Очищаємо інпут
                fileInput.value = '';
            }
        }
    });
</script>

</body>
</html>
