<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section.article-form-section}, ~{::script})}">
<head>
    <title>Конструктор статті | MMC</title>
</head>
<body>

<section class="editor-shell article-form-section">
    <div class="section-hdr" style="text-align: center; margin-bottom: 2rem;">
        <h1 class="page-title-accent">Створення матеріалу</h1>
        <p class="article-excerpt">Заповніть поля для публікації в базу знань</p>
    </div>

    <div class="card-container">
        <form th:action="@{/admin/articles/create}" th:object="${articleForm}" method="post" class="stack-form">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-field">
                <label class="form-label" for="title">Назва статті:</label>
                <input type="text" id="title" th:field="*{title}" class="form-input" placeholder="Заголовок...">
                <p class="status-message status-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
            </div>

            <div class="form-field">
                <label class="form-label" for="description">Короткий опис (анонс):</label>
                <textarea id="description" th:field="*{description}" class="form-input" rows="3" placeholder="Про що ця стаття..."></textarea>
            </div>

            <div class="form-field">
                <label class="form-label">Тематичний розділ:</label>
                <select id="categorySelector" class="form-input" onchange="syncCategory(this)">
                    <option value="">-- Оберіть існуючий --</option>
                    <option value="inner-calm">Тривога та панічні стани</option>
                    <option value="restore-resource">Відновлення ресурсу</option>
                    <option value="closeness-crisis">Кризи близькості</option>
                    <option value="new-meanings">Депресивні стани та сенси</option>
                    <option value="freedom-choice">Залежні форми поведінки</option>
                    <option value="dialogue">Конфлікти та медіація</option>
                    <option value="exit-nearby">Ілюзія, що виходу нема</option>
                    <option value="NEW">+ Додати нову категорію</option>
                </select>

                <div style="margin-top: 1rem; display: flex; flex-direction: column; gap: 1rem;">
                    <input type="text" id="finalCategory" th:field="*{category}"
                           class="form-input"
                           style="display: none;"
                           placeholder="URL англійською (напр: burnout)">

                    <input type="text" id="finalCategoryNameUa" th:field="*{categoryNameUa}"
                           class="form-input"
                           style="display: none;"
                           placeholder="Назва на сайті (напр: Емоційне вигорання)">
                </div>

                <p class="status-message status-error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></p>
            </div>

            <div class="form-field">
                <label class="form-label" for="tags">Теги (через кому):</label>
                <input type="text" id="tags" th:field="*{tags}" class="form-input" placeholder="стрес, ресурс, дихання">
            </div>

            <div class="form-field">
                <label class="form-label" for="content">Основний текст статті:</label>
                <textarea id="content" th:field="*{content}" class="form-input" rows="15" placeholder="Пишіть тут..."></textarea>
                <p class="status-message status-error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
            </div>

            <div class="form-actions" style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn-ui">Опублікувати</button>
                <a th:href="@{/admin/articles}" class="btn-ui btn-secondary-soft">Скасувати</a>
            </div>
        </form>
    </div>
</section>

<script>
    function syncCategory(select) {
        const slugInput = document.getElementById('finalCategory');
        const nameInput = document.getElementById('finalCategoryNameUa');

        if (!slugInput || !nameInput) return;

        if (select.value === 'NEW') {
            slugInput.style.display = 'block';
            nameInput.style.display = 'block';
            slugInput.value = '';
            nameInput.value = '';
            slugInput.focus();
        } else if (select.value !== "") {
            slugInput.style.display = 'none';
            nameInput.style.display = 'none';
            slugInput.value = select.value;
            nameInput.value = select.options[select.selectedIndex].text;
        } else {
            slugInput.style.display = 'none';
            nameInput.style.display = 'none';
            slugInput.value = '';
            nameInput.value = '';
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const selector = document.getElementById('categorySelector');
        if (selector) syncCategory(selector);
    });
</script>

</body>
</html>
