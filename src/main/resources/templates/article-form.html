<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(
      ~{::title},
      ~{::section.standard-container-wide},
      ~{::script}
      )}">
<head>
    <title>Конструктор статті | MMC</title>
</head>
<body>

<section class="standard-container standard-container-wide form-group">
    <header class="section-header">
        <h1 class="page-title-accent">Створення матеріалу</h1>
        <p class="heading-lg">Заповніть поля для публікації в базу знань</p>
    </header>

    <div class="article-card">
        <form th:action="@{/admin/articles/create}" th:object="${articleForm}" method="post">
            <input type="hidden" th:field="*{id}" />
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="title">Назва статті:</label>
                <input type="text" id="title" th:field="*{title}" class="form-input" placeholder="Заголовок...">
                <p class="error-text" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
            </div>

            <div class="form-group">
                <label for="description">Короткий опис (анонс):</label>
                <textarea id="description" th:field="*{description}" class="form-input" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label>Тематичний розділ:</label>
                <select id="categorySelector" class="form-input" onchange="syncCategory(this)">
                    <option value="">-- Оберіть існуючий --</option>
                    <option value="inner-calm">Тривога та панічні стани</option>
                    <option value="restore-resource">Відновлення ресурсу</option>
                    <option value="closeness-crisis">Кризи близькості</option>
                    <option value="new-meanings">Депресивні стани та сенси</option>
                    <option value="freedom-choice">Залежні форми поведінки</option>
                    <option value="dialogue">Конфлікти та медіація</option>
                    <option value="exit-nearby">Ілюзія, що виходу нема</option>
                    <option value="NEW">+ Додати нову категорію</option>
                </select>

                <input type="text" id="finalCategory" th:field="*{category}"
                       class="form-input hidden-category-field"
                       placeholder="URL англійською (напр: burnout)">
                <p class="error-text" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></p>

                <input type="text" id="finalCategoryNameUa" th:field="*{categoryNameUa}"
                       class="form-input hidden-category-field"
                       placeholder="Назва на сайті (напр: Емоційне вигорання)">
                <p class="error-text" th:if="${#fields.hasErrors('categoryNameUa')}" th:errors="*{categoryNameUa}"></p>
            </div>

            <div class="form-group">
                <label for="tags">Теги (через кому):</label>
                <input type="text" id="tags" th:field="*{tags}" class="form-input" placeholder="стрес, ресурс, дихання">
            </div>

            <div class="form-group">
                <label for="content">Основний текст статті:</label>
                <textarea id="content" th:field="*{content}" class="form-input" rows="15"></textarea>
                <p class="error-text" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Опублікувати</button>
                <a th:href="@{/admin/articles}" class="btn-outline">Скасувати</a>
            </div>
        </form>
    </div>
</section>

<script>
    function syncCategory(select) {
        const slugInput = document.getElementById('finalCategory');
        const nameInput = document.getElementById('finalCategoryNameUa');

        if (!slugInput || !nameInput) return;

        if (select.value === 'NEW') {
            // Вибрали нову: показуємо обидва поля (прибираючи клас)
            slugInput.classList.remove('hidden-category-field');
            nameInput.classList.remove('hidden-category-field');
            slugInput.value = '';
            nameInput.value = '';
            slugInput.focus();
        } else if (select.value !== "") {
            // Вибрали існуючу: ховаємо поля, але копіюємо в них дані
            slugInput.classList.add('hidden-category-field');
            nameInput.classList.add('hidden-category-field');

            slugInput.value = select.value;
            nameInput.value = select.options[select.selectedIndex].text;
        } else {
            // Скинули вибір
            slugInput.classList.add('hidden-category-field');
            nameInput.classList.add('hidden-category-field');
            slugInput.value = '';
            nameInput.value = '';
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const selector = document.getElementById('categorySelector');
        if (selector) syncCategory(selector);
    });
</script>

</body>
</html>
