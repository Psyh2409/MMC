<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{})}">
<head>
    <title>Новий пароль | Психотерапія</title>
</head>
<body>
<section class="standard-container standard-container-compact">
    <h2 class="contact-intro-title">Встановити новий пароль</h2>

    <div th:if="${error}" class="status-message status-error" th:text="${error}"></div>

    <form th:action="@{/reset-password}" th:object="${resetPasswordForm}" method="post" class="stack-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" th:field="*{token}">

        <div class="form-field">
            <label class="form-label">Новий пароль</label>
            <input type="password" th:field="*{newPassword}" class="form-input" placeholder="Щонайменше 8 символів">
            <div class="form-error-text" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
        </div>

        <div class="form-field">
            <label class="form-label">Підтвердіть новий пароль</label>
            <input type="password" th:field="*{confirmNewPassword}" class="form-input" placeholder="Повторіть новий пароль">
            <div class="form-error-text" th:if="${#fields.hasErrors('confirmNewPassword')}" th:errors="*{confirmNewPassword}"></div>
        </div>

        <button type="submit" class="submit-button submit-button-primary">Оновити пароль</button>
    </form>
</section>
</body>
</html>
