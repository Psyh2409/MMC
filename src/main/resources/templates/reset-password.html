<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{::page-scripts})}">
<head>
    <title>Новий пароль | Психотерапія</title>
</head>
<body>
<section class="card-container login-page-wrapper">
    <h2 class="page-title-accent">Встановити новий пароль</h2>

    <div th:if="${error}" class="status-message status-error" th:text="${error}">
        Помилка при зміні пароля
    </div>

    <form th:action="@{/reset-password}" th:object="${resetPasswordForm}" method="post" class="stack-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="hidden" th:field="*{token}">

        <div class="form-field">
            <label class="form-label">Новий пароль</label>
            <div class="password-container">
                <input type="password" th:field="*{newPassword}" class="form-input"
                       id="password" placeholder="Щонайменше 8 символів" required>
                <button type="button" id="togglePassword" class="password-toggle-btn" tabindex="-1">
                    👁️
                </button>
            </div>
            <div class="form-error-text" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
        </div>

        <div class="form-field">
            <label class="form-label">Підтвердіть новий пароль</label>
            <div class="password-container">
                <input type="password" th:field="*{confirmNewPassword}" class="form-input"
                       id="confirmPassword" placeholder="Повторіть новий пароль" required>
                <button type="button" id="toggleConfirmPassword" class="password-toggle-btn" tabindex="-1">
                    👁️
                </button>
            </div>
            <div class="form-error-text" th:if="${#fields.hasErrors('confirmNewPassword')}" th:errors="*{confirmNewPassword}"></div>
        </div>

        <button type="submit" class="btn-ui btn-login-submit">
            Оновити пароль
        </button>
    </form>
</section>

<th:block th:fragment="page-scripts">
    <script th:src="@{/js/password-toggle.js}"></script>
</th:block>
</body>
</html>
