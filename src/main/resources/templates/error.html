<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{})}">
<head>
    <title th:text="${errorTitle} + ' | ММЦ'">Помилка | ММЦ</title>
</head>
<body>
<section class="card-container login-page-wrapper">
    <div class="status-message status-error error-content-box">

        <p class="error-large-code" th:text="${statusCode}">500</p>

        <h1 class="page-title-accent error-title-clean" th:text="${errorTitle}">Щось пішло не так</h1>

        <p class="article-meta" th:text="${errorMessage}">
            Виникла непередбачувана помилка. Спробуйте повернутися на головну сторінку.
        </p>

        <div class="error-actions-group">
            <a href="/" class="btn-ui">На головну</a>
            <a href="/contact" class="btn-ui btn-secondary-soft">Написати мені</a>
        </div>
    </div>
</section>
</body>
</html>
