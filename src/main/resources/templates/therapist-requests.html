<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{::script})}">
<head>
    <title>Мої звернення | MMC</title>
</head>
<body>

<section class="standard-container standard-container-wide">

    <div class="dashboard-hero-card mb-md">
        <div class="hero-top-row" style="display: flex; justify-content: space-between; align-items: center;">
            <div class="hero-text-block">
                <h1 class="page-title-accent">Мої звернення</h1>
                <p class="hero-description">Приватні повідомлення від клієнтів.</p>
            </div>
            <div class="hero-global-actions">
                <a href="/therapist/dashboard" class="btn-outline">⬅ В кабінет</a>
            </div>
        </div>
    </div>

    <div class="card-primary">
        <div class="table-responsive-wrapper">
            <table class="data-table table-fluid">
                <thead>
                <tr>
                    <th style="width: 15%;">Дата</th>
                    <th style="width: 25%;">Відправник</th>
                    <th style="width: 45%;">Повідомлення</th>
                    <th style="width: 15%; text-align: right;">Дії</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="req : ${requests}">

                    <tr>
                        <td>
                            <span class="text-sm text-nowrap" th:text="${#temporals.format(req.createdAt, 'dd.MM.yyyy HH:mm')}">Дата</span><br>
                            <span th:if="${req.status.name() == 'NEW'}" class="text-error text-xs" style="font-weight: 600;">НОВЕ</span>
                            <span th:if="${req.status.name() == 'ANSWERED'}" class="text-success text-xs">ОБРОБЛЕНО</span>
                        </td>

                        <td>
                            <strong class="text-wrap-break" th:text="${req.name}">Ім'я</strong><br>
                            <span class="text-xs text-muted text-wrap-break" th:text="${req.contact}">Email</span>
                        </td>

                        <td class="clickable-row" th:data-target="'reply-row-' + ${req.id}" onclick="toggleReply(this)">
                            <div class="msg-short" th:text="${#strings.abbreviate(req.message, 60)}">Текст...</div>
                            <div class="msg-full is-hidden text-wrap-break" th:text="${req.message}">Повний текст</div>
                        </td>

                        <td class="text-right">
                            <form th:action="@{/therapist/requests/delete/{id}(id=${req.id})}" method="post" class="form-inline-reset" onsubmit="return confirm('Видалити це звернення безповоротно?');">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn-primary btn-sm text-nowrap">Видалити</button>
                            </form>
                        </td>
                    </tr>

                    <tr th:id="'reply-row-' + ${req.id}" class="is-hidden" style="background-color: var(--bg-canvas);">
                        <td colspan="4" style="padding: var(--space-md);">

                            <div th:if="${req.status.name() == 'ANSWERED'}" style="border-left: 3px solid var(--primary-color); padding-left: var(--space-sm);">
                                <strong class="text-sm text-muted">Ваша відповідь:</strong><br>
                                <span class="text-sm text-wrap-break" th:text="${req.adminReply}">Текст</span>
                            </div>

                            <div th:if="${req.status.name() != 'ANSWERED'}">
                                <form th:action="@{/therapist/requests/{id}/reply(id=${req.id})}" method="post" class="stack-form">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                                    <label class="form-label text-sm">Ваша відповідь (буде надіслана на email клієнта):</label>
                                    <textarea name="replyMessage" class="form-textarea" rows="3" placeholder="Напишіть відповідь..." required></textarea>

                                    <div style="display: flex; justify-content: flex-end; margin-top: var(--space-sm);">
                                        <button type="submit" class="btn-primary btn-sm">Надіслати листа</button>
                                    </div>
                                </form>
                            </div>
                        </td>
                    </tr>
                </th:block>

                <tr th:if="${requests == null or requests.isEmpty()}">
                    <td colspan="4" class="text-center text-muted" style="padding: 3rem 0;">
                        ☕ У вас поки немає нових повідомлень.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>

<script src="/js/requests.js" defer></script>
</body>
</html>
