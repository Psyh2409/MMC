<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header-fragment"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        class="site-header">
    <div class="site-header-inner">

        <a href="/" class="site-brand">
            🌿 <span class="site-brand-text">Шлях до себе</span>
        </a>
        <a th:href="@{/chat}"
           sec:authorize="isAuthenticated()"
           class="btn-nav-round">
            Чат спільноти
        </a>
        <nav class="site-nav">

            <div class="dropdown">
                <span class="site-nav-label">Проблематика ▼</span>
                <div class="dropdown-content">
                    <!-- Динамічне завантаження категорій з мапи (Ключ - URL, Значення - Текст) -->
                    <a th:each="entry : ${allCategoriesMap}"
                       th:href="@{/issues/{topic}(topic=${entry.key})}"
                       th:text="${entry.value}">Українська назва</a>

                    <!-- Фолбек (якщо в базі поки порожньо) -->
                    <th:block th:if="${#maps.isEmpty(allCategoriesMap)}">
                        <a href="/issues/inner-calm">Тривога та панічні стани</a>
                        <a href="/issues/restore-resource">Відновлення ресурсу</a>
                    </th:block>
                </div>
            </div>

            <a href="/about" class="site-nav-link">Про мене</a>
            <a href="/first-steps" class="site-nav-link">Перші кроки</a>

            <div sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/users}" class="admin-link">⚙️Адмінка</a>
            </div>

            <div sec:authorize="isAnonymous()">
                <a href="/login" class="site-nav-link">Увійти</a>
            </div>

            <div sec:authorize="isAuthenticated()" class="user-menu">
                <span class="user-menu-greeting">
                    Вітаю, <a th:href="@{/profile}" class="user-profile-link">
                        <strong th:text="${currentUserDisplayName}" class="user-menu-name"></strong>
                    </a>
                </span>

                <a th:href="@{/profile}" class="site-nav-link" title="Мій кабінет">👤</a>

                <form th:action="@{/logout}" method="post" class="logout-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="logout-button">Вийти</button>
                </form>
            </div>
        </nav>
    </div>
</header>

<footer th:fragment="footer-fragment" class="site-footer">
    <div class="site-footer-inner">
        <div class="footer-left">
            <a th:href="@{/contact}" class="footer-link-action">
                📩<span class="footer-action-text">Контакти</span>
            </a>
        </div>

        <div class="footer-center">
            <span class="footer-copy">© 2026 MMC Mental Management Center</span>
        </div>

        <div class="footer-right">
            <a href="/" class="site-brand-footer">
                🌿 <span class="site-brand-text-footer">Шлях до себе</span>
            </a>
        </div>
    </div>
</footer>
</body>
</html>
