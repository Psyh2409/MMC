<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<body>

<header th:fragment="header-fragment"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        class="site-header">
    <div class="site-header-inner">

        <a href="/" class="site-brand">
            🌿 <span class="site-brand-text">Шлях до себе</span>
        </a>

        <nav class="site-nav">

            <div class="dropdown">
                <span class="site-nav-label">Проблематика ▼</span>
                <div class="dropdown-content">
                    <!-- Динамічне завантаження категорій з мапи (Ключ - URL, Значення - Текст) -->
                    <a th:each="entry : ${allCategoriesMap}"
                       th:href="@{/issues/{topic}(topic=${entry.key})}"
                       th:text="${entry.value}">Українська назва</a>

                    <!-- Фолбек (якщо в базі поки порожньо) -->
                    <th:block th:if="${#maps.isEmpty(allCategoriesMap)}">
                        <a href="/issues/inner-calm">Тривога та панічні стани</a>
                        <a href="/issues/restore-resource">Відновлення ресурсу</a>
                    </th:block>
                </div>
            </div>

            <div sec:authorize="isAnonymous()">
                <a th:href="@{/about}" class="site-nav-link">Про мене</a>
            </div>
            <div sec:authorize="isAnonymous()">
                <a th:href="@{/first-steps}" class="site-nav-link">Перші кроки</a>
            </div>
            <div sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="btn-accent-capsule">Увійти</a>
            </div>

            <div sec:authorize="isAuthenticated()" class="user-menu">
                <span class="user-menu-greeting">
                    Вітаю, <a th:href="@{/profile}" class="user-profile-link">
                        <strong th:text="${currentUserDisplayName}" class="user-menu-name"></strong>
                    </a>
                </span>

                <button id="theme-toggle" class="btn-theme-toggle" title="Змінити тему" aria-label="Перемкнути тему">
                    🌙
                </button>

                <form th:action="@{/logout}" method="post" class="logout-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-outline">Вийти</button>
                </form>
            </div>
        </nav>
    </div>
</header>

<footer th:fragment="footer-fragment" class="site-footer">

    <div class="site-footer-inner">
        <div class="footer-left">
            <!-- Для АДМІНІСТРАТОРА: показуємо вхід в панель керування -->
            <div sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/users}" class="nav-link">
                    ⚙️<span class="nav-link">Адмінка</span>
                </a>
            </div>

            <!-- Для ВСІХ ІНШИХ (Гості, Клієнти): показуємо контакти -->
            <div sec:authorize="!hasRole('ADMIN')">
                <a th:href="@{/contact}" class="nav-link">
                    📩<span class="nav-link">Контакти</span>
                </a>
            </div>
        </div>

        <div class="footer-center">
            <span class="text-muted">© 2026 MMC Mental Management Center</span>
        </div>

        <div class="footer-right">
            <div sec:authorize="isAuthenticated()">
                <a th:href="@{/chat}"
                 sec:authorize="isAuthenticated()"
                  class="btn-nav-round">
                  Чат спільноти
                </a>
            </div>
            <div sec:authorize="isAnonymous()">
                <a href="/" class="site-brand-footer">
                    🌿 <span class="site-brand-text-footer">Шлях до себе</span>
                </a>
            </div>
        </div>
    </div>
</footer>
</body>
</html>
