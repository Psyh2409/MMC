<div th:fragment="wallFeed" id="wallFeed" xmlns:th="http://www.w3.org/1999/xhtml">

    <div class="card-primary mb-md">
        <form id="wallForm" th:action="@{/api/room/{id}/wall/add(id=${roomId})}" method="POST" class="stack-form" enctype="multipart/form-data">
            <div class="form-field">
                <textarea id="wallContent" name="content" rows="4" class="form-input" placeholder="Напишіть повідомлення на спільній стіні..."></textarea>
            </div>
            <div class="button-row">
                <div class="left-actions">
                    <label for="wallMedia" class="btn-outline">📎 Медіафайл</label>
                    <input type="file" id="wallMedia" name="media" accept="image/*,video/*" class="visually-hidden-input wall-media-input">
                    <span id="wallFileNameDisplay" class="file-name-display text-sm text-muted ml-sm"></span>
                </div>
                <div class="right-actions form-actions">
                    <button type="submit" id="btnSubmitWallForm" class="btn-primary hidden">Опублікувати</button>
                    <button type="button" id="btnResetWallForm" class="btn-outline hidden">Скасувати</button>
                </div>
            </div>
            <div class="edit-media-preview mt-sm"></div>
        </form>
    </div>

    <div class="journal-feed-list">
        <div th:if="${posts == null or posts.empty}" class="empty-state text-center mt-lg">
            <p class="text-muted">Спільна стіна порожня. Почніть спілкування першими.</p>
        </div>

        <div th:each="post : ${posts}" class="journal-post-card card-secondary mb-sm relative">

            <div th:if="${post.authorId == currentUser.id}" class="post-actions absolute top-0 right-0 p-sm">
                <button class="btn-icon" th:data-id="${post.id}" th:data-room="${roomId}" onclick="window.prepareEditWallPost(this.getAttribute('data-id'), this.getAttribute('data-room'), this)" title="Редагувати">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </button>
                <button class="btn-icon delete-icon" th:data-id="${post.id}" th:data-room="${roomId}" onclick="window.deleteWallPost(this)" title="Видалити">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            </div>

            <div class="post-header row-between text-sm text-muted mb-xs">
                <span th:text="${post.authorId == currentUser.id ? 'Ви' : 'Співрозмовник'}">Автор</span>
                <span th:text="${#temporals.format(post.createdAt, 'dd.MM.yyyy HH:mm')}">Дата</span>
            </div>

            <div th:if="${post.content != null and post.content != '[MEDIA_ONLY]'}" class="journal-post-content text-body" th:text="${post.content}">Текст</div>

            <div th:if="${post.mediaFileName != null}" class="journal-post-media-box mt-sm">
                <div th:if="${post.mediaFileName.toLowerCase().matches('.*\.(mp4|webm|ogg)$')}" class="media-wrapper">
                    <video controls preload="metadata" class="journal-post-video">
                        <source th:src="@{/api/room/{roomId}/wall/media/{name}(roomId=${roomId}, name=${post.mediaFileName})}" type="video/mp4">
                    </video>
                </div>
                <div th:unless="${post.mediaFileName.toLowerCase().matches('.*\.(mp4|webm|ogg)$')}" class="media-wrapper">
                    <img th:src="@{/api/room/{roomId}/wall/media/{name}(roomId=${roomId}, name=${post.mediaFileName})}" alt="Media" class="journal-post-img">
                </div>
            </div>
        </div>
        <div class="edit-form-container hidden"></div>
    </div>

    <div th:if="${totalPages > 1}" class="button-row pagination-row mt-md">
        <button th:if="${currentPage > 0}"
                th:data-room="${roomId}"
                th:data-page="${currentPage - 1}"
                th:data-size="${pageSize}"
                onclick="window.loadWallPage(this)"
                class="btn-outline btn-sm">Попередня</button>

        <span class="text-muted text-sm" th:text="'Сторінка ' + (${currentPage} + 1) + ' з ' + ${totalPages}"></span>

        <button th:if="${hasMore}"
                th:data-room="${roomId}"
                th:data-page="${currentPage + 1}"
                th:data-size="${pageSize}"
                onclick="window.loadWallPage(this)"
                class="btn-outline btn-sm">Наступна</button>
    </div>
</div>
