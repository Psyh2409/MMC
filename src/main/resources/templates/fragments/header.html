<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="header-fragment" class="site-header">
    <div class="site-header-inner">
        <a href="/" class="site-brand">
            🌿 <span class="site-brand-text">Шлях до себе</span>
        </a>

        <nav class="site-nav">
            <div class="dropdown">
                <span class="site-nav-label">Проблематика ▼</span>
                <div class="dropdown-content">
                    <a th:each="entry : ${allCategoriesMap}"
                       th:href="@{/issues/{topic}(topic=${entry.key})}"
                       th:text="${entry.value}">Українська назва</a>
                    <th:block th:if="${#maps.isEmpty(allCategoriesMap)}">
                        <a href="/issues/inner-calm">Тривога та панічні стани</a>
                        <a href="/issues/restore-resource">Відновлення ресурсу</a>
                    </th:block>
                </div>
            </div>

            <div sec:authorize="isAnonymous()">
                <a th:href="@{/about}" class="site-nav-link">Про мене</a>
            </div>
            <div sec:authorize="isAnonymous()">
                <a th:href="@{/first-steps}" class="site-nav-link">Перші кроки</a>
            </div>
            <div sec:authorize="isAnonymous()">
                <a th:href="@{/login}" id="navLoginBtn" class="btn-primary site-nav-link">Увійти</a>
            </div>

            <div sec:authorize="isAuthenticated()" class="user-menu">
                <span class="user-menu-greeting">
                    Вітаю, <a th:href="@{/profile}" class="user-profile-link">
                        <strong th:text="${currentUserDisplayName}" class="user-menu-name"></strong>
                    </a>
                </span>

                <button id="theme-toggle" class="btn-theme-toggle" title="Змінити тему" aria-label="Перемкнути тему">
                    🌙
                </button>

                <form th:action="@{/logout}" method="post" class="logout-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-outline">Вийти</button>
                </form>
            </div>
        </nav>
    </div>
</header>
</body>
</html>
