<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{::page-scripts})}">
<head>
    <title>Мій Профіль | Психотерапія</title>
</head>
<body>
<section class="standard-container standard-container-compact">
    <h2 class="contact-intro-title">Особистий кабінет</h2>

    <div class="profile-card">
        <div class="profile-row">
            <span class="profile-label">Ім'я:</span>
            <span class="profile-value" th:text="${user.name}">Ім'я</span>
        </div>
        <div class="profile-row">
            <span class="profile-label">Ваш статус:</span>
            <div class="role-badges">
                <span th:if="${user.admin}"
                    class="badge badge-admin">Адміністратор</span>

                <span th:if="${user.therapist}"
                      class="badge badge-therapist">Терапевт</span>

                <span th:if="${user.client}"
                      class="badge badge-client">Клієнт</span>

                <span th:if="${user.reader}"
                      class="badge badge-reader">Читач</span>
            </div>
        </div>
    </div>

    <div class="profile-card" style="margin-top: 24px;">
        <h3 class="contact-intro-title" style="font-size: 1.4rem; margin-bottom: 16px;">Дані профілю</h3>

        <div th:if="${profileSuccess}" class="status-message status-success" th:text="${profileSuccess}"></div>
        <div th:if="${profileError}" class="status-message status-error" th:text="${profileError}"></div>

        <form th:action="@{/profile}" th:object="${profileUpdateForm}" method="post" class="stack-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-field">
                <label class="form-label">Ім'я для відображення</label>
                <input type="text" th:field="*{name}" class="form-input" placeholder="Як до вас звертатися?">
                <div class="form-error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <button type="submit" class="submit-button submit-button-soft">Зберегти зміни</button>
        </form>
    </div>

    <div class="profile-card" style="margin-top: 24px;">
        <h3 class="contact-intro-title" style="font-size: 1.4rem; margin-bottom: 16px;">Зміна пароля</h3>

        <div th:if="${passwordSuccess}" class="status-message status-success" th:text="${passwordSuccess}"></div>
        <div th:if="${passwordError}" class="status-message status-error" th:text="${passwordError}"></div>

        <form th:action="@{/profile/password}" th:object="${passwordChangeForm}" method="post" class="stack-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-field">
                <label class="form-label">Поточний пароль</label>
                <input type="password" th:field="*{currentPassword}" class="form-input" placeholder="Введіть поточний пароль">
                <div class="form-error-text" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
            </div>

            <div class="form-field">
                <label class="form-label">Новий пароль</label>
                <input type="password" th:field="*{newPassword}" class="form-input" placeholder="Щонайменше 8 символів">
                <div class="form-error-text" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
            </div>

            <div class="form-field">
                <label class="form-label">Підтвердіть новий пароль</label>
                <input type="password" th:field="*{confirmNewPassword}" class="form-input" placeholder="Повторіть новий пароль">
                <div class="form-error-text" th:if="${#fields.hasErrors('confirmNewPassword')}" th:errors="*{confirmNewPassword}"></div>
            </div>

            <button type="submit" class="submit-button submit-button-brown">Оновити пароль</button>
        </form>
    </div>

    <div class="profile-actions">
        <a href="/" class="btn-dashboard-link">Повернутися</a>
    </div>
</section>

<th:block th:fragment="page-scripts">
</th:block>
</body>
</html>
