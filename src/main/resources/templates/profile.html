<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{::page-scripts})}">
<head>
    <title>Мій Профіль | Психотерапія</title>
</head>
<body>
<!-- ... початок файлу ... -->
<section class="standard-container-wide">
    <h2 class="contact-intro-title">Особистий кабінет</h2>
    <div class="profile-dashboard">
        <!-- ЛІВА КОЛОНКА -->
        <aside class="profile-sidebar">
            <div class="profile-card profile-user-info">
                <div class="avatar-circle">
                    <span th:text="${#strings.substring(user.name, 0, 1)}">С</span>
                </div>
                <h3 class="profile-header-title" th:text="${user.name}">Ім'я</h3>
                <!-- ... бейджі ... -->

                <hr class="profile-divider">

                <h4 class="profile-section-title" style="font-size: 1.1rem; margin-bottom: 0;">Кольорова тема</h4>

                <!-- Залишаємо тільки дві "Фундаментальні" теми -->
                <div class="theme-switcher-grid" style="margin-top: var(--space-sm);">
                    <button type="button" class="theme-dot" data-theme-value="brown" title="Авторська (Коричнева)"></button>
                    <button type="button" class="theme-dot" data-theme-value="gray" title="Базова (Сіра)"></button>
                </div>

                <p class="theme-switcher-desc" style="margin-top: var(--space-md);">Або знайдіть свій відтінок:</p>
                <!-- МАГІЯ: Повзунок Спектру -->
                <input type="range" id="hue-slider" class="theme-spectrum-slider" min="0" max="360" value="15">
            </div>

            <!-- КНОПКА ПОВЕРНЕННЯ ПОВЕРНУЛАСЯ! -->
            <div style="margin-top: var(--space-md);">
                <a href="/" class="btn-primary" style="width: 100%; justify-content: center;">Повернутися на головну</a>
            </div>
        </aside>

        <!-- ПРАВА КОЛОНКА ... залишається без змін ... -->

        <!-- ПРАВА КОЛОНКА (Форми) -->
        <main class="profile-content-area">
            <div class="profile-card">
                <h3 class="profile-section-title">Дані профілю</h3>
                <div th:if="${profileSuccess}" class="status-message status-success" th:text="${profileSuccess}"></div>
                <div th:if="${profileError}" class="status-message status-error" th:text="${profileError}"></div>

                <form th:action="@{/profile}" th:object="${profileUpdateForm}" method="post" class="stack-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="form-field">
                        <label class="form-label">Ім'я для відображення</label>
                        <input type="text" th:field="*{name}" class="form-input" placeholder="Як до вас звертатися?">
                        <div class="form-error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <button type="submit" class="btn-primary">Зберегти зміни</button>
                </form>
            </div>

            <div class="profile-card">
                <h3 class="profile-section-title">Зміна пароля</h3>
                <div th:if="${passwordSuccess}" class="status-message status-success" th:text="${passwordSuccess}"></div>
                <div th:if="${passwordError}" class="status-message status-error" th:text="${passwordError}"></div>

                <form th:action="@{/profile/password}" th:object="${passwordChangeForm}" method="post" class="stack-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="form-field">
                        <label class="form-label">Поточний пароль</label>
                        <input type="password" th:field="*{currentPassword}" class="form-input">
                    </div>
                    <div class="form-field">
                        <label class="form-label">Новий пароль</label>
                        <input type="password" th:field="*{newPassword}" class="form-input">
                    </div>
                    <div class="form-field">
                        <label class="form-label">Підтвердіть новий пароль</label>
                        <input type="password" th:field="*{confirmNewPassword}" class="form-input">
                    </div>
                    <button type="submit" class="btn-primary">Оновити пароль</button>
                </form>
            </div>
        </main>
    </div>
</section>

<!-- СКРИПТ ПЕРЕМИКАННЯ ТЕМ -->
<th:block th:fragment="page-scripts">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeDots = document.querySelectorAll('.theme-dot');
            const hueSlider = document.getElementById('hue-slider');

            // Логіка для фіксованих крапочок (Коричнева / Сіра)
            themeDots.forEach(dot => {
                dot.addEventListener('click', () => {
                    const selectedTheme = dot.getAttribute('data-theme-value');
                    document.documentElement.setAttribute('data-theme', selectedTheme);
                    document.documentElement.style.removeProperty('--theme-h'); // Очищаємо кастомний колір
                    localStorage.setItem('app-theme', selectedTheme);
                    localStorage.removeItem('custom-hue');
                });
            });

            // МАГІЯ: Логіка для Спектру
            hueSlider.addEventListener('input', (e) => {
                const customHue = e.target.value;
                document.documentElement.setAttribute('data-theme', 'custom');
                // Перевизначаємо HSL-змінні на льоту!
                document.documentElement.style.setProperty('--theme-h', customHue);
                document.documentElement.style.setProperty('--theme-s', '75%');

                localStorage.setItem('app-theme', 'custom');
                localStorage.setItem('custom-hue', customHue);
            });
        });
    </script>
</th:block>
</body>
</html>
