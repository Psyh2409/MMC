<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{::page-scripts})}">
<head>
    <title>Мій Профіль | Психотерапія</title>
</head>
<body>

<section class="standard-container-wide">
    <h2 class="contact-intro-title">Особистий кабінет</h2>
    <div class="profile-dashboard">

        <!-- ЛІВА КОЛОНКА -->
        <aside class="profile-sidebar">

            <div class="profile-card">
                <div class="avatar-circle">
                    <span th:text="${user.name != null and user.name.length() > 0 ? #strings.substring(user.name, 0, 1) : 'U'}">С</span>
                </div>
                <h3 class="profile-header-title" th:text="${user.name}">Ім'я</h3>
                <p class="status-text-muted">Технічні налаштування</p>

                <hr class="profile-divider">

                <h4 class="profile-section-title">Кольорова тема</h4>
                <div class="theme-spectrum-container">
                    <input type="range" id="theme-slider" class="theme-spectrum-slider" min="0" max="360" value="15">
                </div>
                <div class="ptsr-mode-container">
                    <a href="#" id="ptsr-link" class="btn-primary">Монохромна тема</a>
                </div>
            </div>

            <div class="profile-card">
                <h4 class="profile-section-title">Дані профілю</h4>
                <div th:if="${profileSuccess}" class="status-message status-success" th:text="${profileSuccess}"></div>

                <form th:action="@{/profile}" th:object="${profileUpdateForm}" method="post" class="stack-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="form-field">
                        <input type="text" th:field="*{name}" class="form-input" placeholder="Ім'я для відображення">
                    </div>
                    <button type="submit" class="btn-primary">Зберегти</button>
                </form>

                <hr class="profile-divider">

                <h4 class="profile-section-title">Зміна пароля</h4>
                <div th:if="${passwordSuccess}" class="status-message status-success" th:text="${passwordSuccess}"></div>

                <form th:action="@{/profile/password}" th:object="${passwordChangeForm}" method="post" class="stack-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="form-field">
                        <input type="password" th:field="*{currentPassword}" class="form-input" placeholder="Поточний пароль">
                    </div>
                    <div class="form-field">
                        <input type="password" th:field="*{newPassword}" class="form-input" placeholder="Новий пароль">
                    </div>
                    <div class="form-field">
                        <input type="password" th:field="*{confirmNewPassword}" class="form-input" placeholder="Підтвердіть новий">
                    </div>
                    <button type="submit" class="btn-primary">Оновити</button>
                </form>
            </div>
        </aside>

        <!-- ПРАВА КОЛОНКА (Особистий простір) -->
        <main class="profile-content-area">
            <!-- Блок доступу до відеосесії (Показується тільки Клієнтам) -->
            <div th:if="${user.isClient()}" class="profile-card" style="border: var(--border-width) solid var(--success-color);">
                <h3 class="profile-section-title">Ваш терапевтичний простір</h3>
                <p class="status-text-muted" style="margin-bottom: var(--space-md);">Тут відбувається захищений відеозв'язок з вашим терапевтом. Натисніть кнопку під час запланованої сесії.</p>

                <!-- Кнопка веде на кімнату, підставляючи UUID клієнта -->
                <a th:href="@{/therapy/room/{id}(id=${user.id})}" class="btn-primary" style="display: inline-block; text-align: center; width: 100%;">
                    Приєднатися до відеосесії
                </a>
            </div>
        </main>

    </div>
</section>

<!-- МАГІЯ ЛОГІКИ: Збереження та ініціалізація -->
<th:block th:fragment="page-scripts">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const slider = document.getElementById('theme-slider');
            const ptsrLink = document.getElementById('ptsr-link');
            const root = document.documentElement;

            // 1. При завантаженні сторінки ставимо повзунок
            const savedTheme = localStorage.getItem('app-theme') || 'brown';
            const savedHue = localStorage.getItem('custom-hue');

            if (savedTheme === 'custom' && savedHue) {
                slider.value = savedHue;
            } else {
                slider.value = 15; // Дефолтний коричневий
            }

            // 2. Універсальна функція оновлення теми
            const updateTheme = (hue, sat = '75%', themeName = 'custom') => {
                root.setAttribute('data-theme', themeName);
                root.style.setProperty('--theme-h', hue);
                root.style.setProperty('--theme-s', sat);

                // Зберігаємо ВСЕ в локальну пам'ять, щоб base.html підхопив
                localStorage.setItem('app-theme', themeName);
                localStorage.setItem('custom-hue', hue);
                localStorage.setItem('custom-sat', sat);
            };

            // 3. Користувач тягне повзунок
            slider.addEventListener('input', (e) => {
                // Відновлюємо яскравість до 75%, якщо користувач тягне повзунок
                updateTheme(e.target.value, '75%', 'custom');
            });

            // 4. Користувач тисне "режим птср"
            ptsrLink.addEventListener('click', (e) => {
                e.preventDefault();
                // Зберігаємо як 'custom', але задаємо блідість 5%
                updateTheme(210, '5%', 'custom');
                slider.value = 210; // Повзунок автоматично стрибає
            });
        });
    </script>
</th:block>
</body>
</html>
