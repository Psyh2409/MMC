<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section})}">
<head>
    <title>Увійти | Психотерапія</title>
</head>
<body>
<section class="standard-container standard-container-compact standard-container-login">
    <h2 class="contact-intro-title">Увійти до кабінету</h2>

    <div th:if="${param.error}" class="status-message status-error">
        Невірна електронна адреса або пароль. Спробуйте ще раз.
    </div>

    <div th:if="${param.logout}" class="status-message status-success">
        Ви успішно вийшли із системи.
    </div>

    <form th:action="@{/login}" method="post" class="stack-form">
        <div class="form-field">
            <label class="form-label">Електронна пошта</label>
            <input type="email" name="username" required placeholder="example@mail.com"
                   class="form-input">
        </div>

        <div class="form-field">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" required placeholder="••••••••"
                   class="form-input">
        </div>

        <button type="submit" class="submit-button submit-button-brown">
            Увійти
        </button>
    </form>

    <p class="helper-text-centered">
        Ще не маєте акаунту? <a href="/register" class="helper-link">Зареєструватися</a>
    </p>
</section>
</body>
</html>
