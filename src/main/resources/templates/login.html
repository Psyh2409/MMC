<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{::page-scripts})}">

<head>
    <title>Увійти | Психотерапія</title>
</head>

<body>
<section class="card-container login-page-wrapper">
    <h2 class="page-title-accent">Увійти до кабінету</h2>

    <div th:if="${param.error}" class="status-message status-error">
        Невірна електронна адреса або пароль. Спробуйте ще раз.
    </div>
    <div th:if="${param.logout}" class="status-message status-success">
        Ви успішно вийшли із системи.
    </div>
    <div th:if="${param.needsActivation}" class="status-message status-success">
        <strong>Майже готово!</strong> Перевірте пошту для активації акаунту.
    </div>
    <div th:if="${param.activated}" class="status-message status-success">
        Акаунт активовано! Можна входити.
    </div>

    <form th:action="@{/login}" method="post" class="stack-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-field">
            <label class="form-label">Електронна пошта</label>
            <input type="email" name="username" required placeholder="example@mail.com" class="form-input">
        </div>

        <div class="form-field">
            <label class="form-label">Пароль</label>
            <div class="password-container">
                <input type="password" name="password" id="password" required placeholder="••••••••" class="form-input">
                <button type="button" id="togglePassword" class="password-toggle-btn" tabindex="-1">
                    👁️
                </button>
            </div>
        </div>

        <button type="submit" class="btn-ui btn-login-submit">
            Увійти
        </button>
    </form>

    <div class="oauth-login-block">
        <div class="oauth-divider"><span>або</span></div>
        <div class="oauth-buttons">
            <a th:if="${googleOAuthEnabled}" href="/oauth2/authorization/google" class="oauth-button-google">
                <span class="oauth-icon-google">
                    <svg viewBox="0 0 48 48">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        <path fill="none" d="M0 0h48v48H0z"/>
                    </svg>
                </span>
                Увійти через Google
            </a>
        </div>
    </div>

    <div class="helper-links-block">
        <p class="helper-text-centered">
            Ще не маєте акаунту? <a href="/register" class="helper-link">Зареєструватися</a>
        </p>
        <p class="helper-text-centered">
            Забули пароль? <a href="/forgot-password" class="helper-link">Відновити доступ</a>
        </p>
    </div>
</section>

<th:block th:fragment="page-scripts">
    <script th:src="@{/js/password-toggle.js}"></script>
</th:block>
</body>

</html>
