<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Startseite - Psychotherapie</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f4f4f4;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .error {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Anmelden in die System</h2>
    <div th:if="${param.error}" class="error">Falsche E-Mail-Adresse oder falsches Passwort</div>
    <div th:if="${param.logout}" style="color: green;">Sie sind abgemeldet</div>

    <form th:action="@{/login}" method="post">
        <label>Email</label>
        <input type="email" name="username" required />
        <label>Passwort</label>
        <input type="password" name="password" required />
        <button type="submit">Anmelden</button>
    </form>
    <p><a href="/register">Noch nicht registriert?</a></p>
</div>
</body>
</html>
