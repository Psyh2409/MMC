<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{})}">
<head>
    <title>Відновлення пароля | Психотерапія</title>
</head>
<body>
<section class="standard-container standard-container-compact">
    <h2 class="contact-intro-title">Відновлення пароля</h2>

    <div th:if="${message}" class="status-message status-success" th:text="${message}"></div>
    <div th:if="${error}" class="status-message status-error" th:text="${error}"></div>

    <form th:action="@{/forgot-password}" th:object="${forgotPasswordForm}" method="post" class="stack-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-field">
            <label class="form-label">Електронна пошта</label>
            <input type="email" th:field="*{email}" class="form-input" placeholder="example@mail.com">
            <div class="form-error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <button type="submit" class="submit-button submit-button-primary">Надіслати посилання</button>
    </form>
</section>
</body>
</html>
