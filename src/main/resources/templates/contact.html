<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{})}">
<head>
    <title>Контакти | Твій простір спокою</title>
</head>
<body>

<section class="standard-container standard-container-narrow">
    <h2 class="contact-intro-title">Написати мені</h2>
    <p class="contact-intro-text">Ви можете залишити тут своє повідомлення, і я обов'язково вам відповім.</p>

    <div th:if="${param.success}" class="status-message status-message-strong status-success">
        ✔ Ваше повідомлення надіслано. Я зв'яжуся з вами найближчим часом.
    </div>

    <form th:action="@{/contact}" method="post" class="stack-form stack-form-sans">

        <div class="form-field">
            <label class="form-label">Ваше ім'я</label>
            <input type="text" name="name" required placeholder="Як до вас звертатися?"
                   class="form-input">
        </div>

        <div class="form-field">
            <label class="form-label">Контактні дані (Телефон або Email)</label>
            <input type="text" name="contact" required placeholder="Куди мені відповісти?"
                   class="form-input">
        </div>

        <div class="form-field">
            <label class="form-label">Ваше повідомлення</label>
            <textarea name="message" rows="6" required placeholder="Опишіть коротко ваш запит..."
                      class="form-textarea"></textarea>
        </div>

        <button type="submit" class="submit-button submit-button-brown">
            Надіслати повідомлення
        </button>
    </form>

    <div class="contact-direct">
        <p class="contact-direct-note">Або напишіть мені безпосередньо у месенджери (WhatsApp, Viber):</p>
        <p class="contact-direct-phone">+38 (097) 822-32-27</p>
    </div>
</section>

</body>
</html>
