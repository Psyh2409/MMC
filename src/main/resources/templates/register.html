<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Anmeldung MMC</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            background-color: #f4f4f4;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 350px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .error {
            color: red;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Kundenregistrierung</h2>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${user}" method="post">

        <label>Name:</label>
        <input type="text" th:field="*{name}" placeholder="Geben Sie ihren Namen ein" required />
        <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

        <label>E-Mail:</label>
        <input type="email" th:field="*{email}" placeholder="beispiel@mail.com" required />
        <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>

        <label>Passwort (Ab 8 Zeichen):</label>
        <input type="password" th:field="*{password}" required />
        <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

        <button type="submit">Registrieren</button>
    </form>
    <p><a href="/login">Haben Sie bereits ein Konto? Anmelden</a></p>
</div>

</body>
</html>
