<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section})}">
<head>
    <title>Реєстрація | Психотерапія</title>
</head>
<body>
<section class="standard-container standard-container-compact">
    <h2 class="contact-intro-title">Реєстрація користувача</h2>

    <div th:if="${error}" class="status-message status-error" th:text="${error}">
        Помилка реєстрації
    </div>

    <form th:action="@{/register}" th:object="${user}" method="post" class="stack-form">

        <div class="form-field">
            <label class="form-label">Ваше ім'я:</label>
            <input type="text" th:field="*{name}" placeholder="Як до вас звертатися?" required
                   class="form-input" />
            <div class="form-error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                Помилка в імені
            </div>
        </div>

        <div class="form-field">
            <label class="form-label">Електронна пошта:</label>
            <input type="email" th:field="*{email}" placeholder="example@mail.com" required
                   class="form-input" />
            <div class="form-error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                Невірний формат пошти
            </div>
        </div>

        <div class="form-field">
            <label class="form-label">Пароль (від 8 символів):</label>
            <input type="password" th:field="*{password}" required placeholder="••••••••"
                   class="form-input" />
            <div class="form-error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                Пароль занадто короткий
            </div>
        </div>

        <button type="submit" class="submit-button submit-button-soft">
            Зареєструватися
        </button>
    </form>

    <p class="helper-text-centered">
        Вже маєте акаунт? <a href="/login" class="helper-link">Увійти</a>
    </p>
</section>
</body>
</html>
