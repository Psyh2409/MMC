<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{::page-scripts})}">
<head>
    <title>Реєстрація | Психотерапія</title>
</head>
<body>
<section class="standard-container standard-container-compact">
    <h2 class="contact-intro-title">Реєстрація користувача</h2>

    <div th:if="${error}" class="status-message status-error" th:text="${error}">
        Помилка реєстрації
    </div>

    <form th:action="@{/register}" th:object="${registrationForm}" method="post" class="stack-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-field">
            <label class="form-label">Ваше ім'я:</label>
            <input type="text" th:field="*{name}" placeholder="Як до вас звертатися?" required
                   class="form-input" />
            <div class="form-error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                Помилка в імені
            </div>
        </div>

        <div class="form-field">
            <label class="form-label">Електронна пошта:</label>
            <input type="email" th:field="*{email}" placeholder="example@mail.com" required
                   class="form-input" />
            <div class="form-error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                Невірний формат пошти
            </div>
        </div>

        <div class="form-field">
            <label class="form-label">Пароль (від 8 символів):</label>
            <div class="password-container">
                <input type="password" th:field="*{password}" required placeholder="••••••••"
                   class="form-input" id="password"/>
                <button type="button" id="togglePassword" class="toggle-password-btn" tabindex="-1">
                    👁️
                </button>
            </div>
            <div class="form-error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">
                    Пароль занадто короткий
            </div>
        </div>
        <div class="form-field">
            <label class="form-label">Повторіть пароль:</label>
            <div class="password-container">
                <input type="password"
                       th:field="*{confirmPassword}"
                       id="confirmPassword"
                       required
                       placeholder="••••••••"
                       class="form-input" />

                <button type="button" id="toggleConfirmPassword" class="toggle-password-btn" tabindex="-1">
                    👁️
                </button>
            </div>
            <div class="form-error-text" th:if="${error != null and error.contains('паролі')}" th:text="${error}">
                Паролі не збігаються
            </div>
        </div>
        <button type="submit" class="btn-primary btn-outline">
            Зареєструватися
        </button>
    </form>

    <p class="helper-text-centered">
        Вже маєте акаунт? <a href="/login" class="helper-link">Увійти</a>
    </p>
</section>
<th:block th:fragment="page-scripts">
    <script th:src="@{/js/password-toggle.js}"></script>
</th:block>
</body>
</html>
