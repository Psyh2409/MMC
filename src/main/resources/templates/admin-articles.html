<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section.admin-list}, ~{})}">
<head>
    <title>Управління статтями | Адмінка</title>
</head>
<body>
<section class="standard-container standard-container-wide admin-list">
    <div class="section-hdr">
        <h1 class="page-title-accent">Всі публікації</h1>
        <div class="admin-actions-bar">
            <button th:onclick="|window.location.href='@{/admin/articles/create}'|" class="btn-ui">
                <span class="icon">+</span> Створити статтю
            </button>
        </div>
    </div>

    <div class="table-scroll">
        <table class="data-table">
            <thead>
            <tr>
                <th>Заголовок</th>
                <th>Категорія</th>
                <th>Дії</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="article : ${articles}">
                <td th:text="${article.title}">Назва</td>
                <td>
                    <span class="category-badge" th:text="${allCategoriesMap[article.category] ?: '⚠️'}">Категорія</span>
                </td>
                <td>
                    <div class="admin-controls-wrapper">
                        <button th:onclick="|window.location.href='@{/admin/articles/edit/{id}(id=${article.id})}'|"
                                class="btn-ui" title="Редагувати">✎</button>

                        <form th:action="@{/admin/articles/delete/{id}(id=${article.id})}" method="post"
                              onsubmit="return confirm('Видалити?');" class="inline-form">
                            <button type="submit" class="btn-delete-small">🗑️</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
