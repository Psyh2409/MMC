<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="main-layout(title, mainContent, pageScripts)">
<head>
    <!-- Пам'ять кольорової теми сайту -->
    <!-- Пам'ять кольорової теми сайту з перевіркою авторизації -->
    <!-- Пам'ять кольорової теми сайту та автоматичне очищення при виході -->
    <script>
        (function() {
            // 1. Читаємо збережені налаштування
            var savedTheme = localStorage.getItem('app-theme') || 'brown';
            var customHue = localStorage.getItem('custom-hue');
            var customSat = localStorage.getItem('custom-sat') || '75%';

            // 2. Застосовуємо тему для поточного завантаження
            document.documentElement.setAttribute('data-theme', savedTheme);
            if (savedTheme === 'custom' && customHue) {
                document.documentElement.style.setProperty('--theme-h', customHue);
                document.documentElement.style.setProperty('--theme-s', customSat);
            }

            // 3. ГЛОБАЛЬНИЙ СЛУХАЧ ВИХОДУ (Без жодних змін у HTML кнопок)
            document.addEventListener('DOMContentLoaded', function() {
                // Перехоплюємо відправку будь-якої форми (Logout у Spring Security - це POST форма)
                document.addEventListener('submit', function(e) {
                    if (e.target && e.target.getAttribute('action') && e.target.getAttribute('action').includes('/logout')) {
                        // Зносимо кольорові фантазії з пам'яті ПЕРЕД виходом
                        localStorage.removeItem('app-theme');
                        localStorage.removeItem('custom-hue');
                        localStorage.removeItem('custom-sat');
                    }
                });
            });
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Психотерапія | Шлях до себе</title>

    <link rel="stylesheet" th:href="@{/css/main.css}">

    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
</head>
<body class="page-shell">

<div th:replace="~{fragments/header-footer :: header-fragment}"></div>

<main class="page-main">
    <div th:replace="${mainContent}"></div>
</main>

<!-- ... попередній код без змін ... -->

<div th:replace="~{fragments/header-footer :: footer-fragment}"></div>

<!-- ГЛОБАЛЬНІ СКРИПТИ -->
<script th:src="@{/js/theme-switcher.js}"></script>

<!-- ЛОКАЛЬНІ СКРИПТИ (якщо сторінка їх передає) -->
<th:block th:replace="${pageScripts} ?: ~{}"></th:block>
</body>
</html>
