<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="main-layout(title, mainContent)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Психотерапія | Шлях до себе</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
</head>
<body style="margin: 0; display: flex; flex-direction: column; min-height: 100vh; background-color: #fdfbf7;">

<div th:replace="~{fragments/header-footer :: header-fragment}"></div>

<main style="flex: 1;">
    <div th:replace="${mainContent}"></div>
</main>

<div th:replace="~{fragments/header-footer :: footer-fragment}"></div>

</body>
</html>
