<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{::page-scripts})}">
<head>
    <title>Сесія | MMC Room</title>
</head>
<body>

<section class="standard-container-wide">
    <div class="session-toggle-wrapper mb-md" th:classappend="${(!isAdmin and !isTherapist and !isSessionActive) ? 'hidden' : ''}">
        <button id="toggle-session-btn" class="btn-primary">
            <span>📹</span> Розгорнути відеосесію
        </button>
    </div>

    <div id="active-session-area" class="hidden">
        <div class="video-main-frame">
            <div id="jitsi-container"></div>
        </div>


    <div class="notes-bottom-panel">
        <div class="notes-header-row">
            <h4 class="profile-section-title" th:text="'Нотатки: ' + ${client.name}">Клієнт</h4>
            <button type="button" id="btn-show-history" class="btn-primary">
                Історія нотаток
            </button>
        </div>
    </div>
        <textarea id="session-notes"
                  class="therapy-textarea"
                  placeholder="Нова сесія. Почніть писати тут..."></textarea>

        <div style="text-align: right; margin-top: var(--space-xs);">
            <span id="sync-status" class="sync-indicator">Очікування...</span>
        </div>
    </div>

    <div class="wall-section mt-md" style="margin-top: 30px;">
        <h4 class="profile-section-title">Спільна стіна</h4>
        <div id="sharedWallContainer">
            <div th:replace="~{fragments/shared-wall-form :: wallFeed}"></div>
        </div>
    </div>
    <div id="history-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Історія записів</h3>
                <button type="button" id="close-modal" class="btn-primary">Закрити</button>
            </div>
            <div id="history-list"></div>
        </div>
    </div>
</section>

<th:block th:fragment="page-scripts">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <script src="https://8x8.vc/external_api.js"></script>

    <script th:inline="javascript">
        window.TherapyConfig = {
            roomName: /*[[${roomName}]]*/ 'default-room',
            userName: /*[[${currentUser.name}]]*/ 'Користувач',
            clientUuid: /*[[${client.id}]]*/ '',
            jitsiJwt: /*[[${jitsiJwt}]]*/ null,
            isProfessional: /*[[${isAdmin || isTherapist}]]*/ false,
            csrfToken: document.querySelector('meta[name="_csrf"]').content,
            csrfHeader: document.querySelector('meta[name="_csrf_header"]').content
        };
    </script>

    <script th:src="@{/js/therapy-room.js}"></script>

    <script th:src="@{/js/media-links.js}"></script>
    <script th:src="@{/js/shared-wall.js}"></script>

</th:block>
</body>
</html>
