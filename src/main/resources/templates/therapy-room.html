<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: main-layout(~{::title}, ~{::section}, ~{::page-scripts})}">
<head>
    <title>Сесія | MMC Room</title>
    <style>
        .standard-container-wide {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
            min-height: calc(100vh - var(--space-xl) * 2);
            padding: var(--space-md);
            background-color: var(--bg-canvas);
        }

        .video-main-frame {
            flex: none;
            height: 50vh;
            background-color: #000;
            border-radius: var(--radius-lg);
            box-shadow: 0 var(--step) calc(var(--step) * 3) var(--shadow-main);
            overflow: hidden;
            position: relative;
            border: calc(var(--step) * 0.25) solid var(--border-soft);
        }

        #jitsi-container { width: 100%; height: 100%; }

        /* Таймер та статус (тільки для адміна) */
        .session-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-sm) var(--space-md);
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            border: calc(var(--step) * 0.25) solid var(--border-soft);
            color: var(--text-secondary);
        }

        .status-icon.active {
            display: inline-block;
            width: var(--step);
            height: var(--step);
            background: var(--status-success);
            border-radius: 50%;
            margin-right: var(--space-xs);
            box-shadow: 0 0 var(--space-sm) var(--status-success);
        }

        .notes-bottom-panel {
            flex: 1;
            background-color: var(--bg-surface);
            padding: var(--space-lg);
            border-radius: var(--radius-lg);
            border: calc(var(--step) * 0.25) solid var(--border-soft);
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .therapy-textarea {
            width: 100%;
            flex-grow: 1;
            min-height: calc(var(--step) * 30);
            background-color: var(--bg-input);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            padding: var(--space-sm);
            border: calc(var(--step) * 0.25) solid var(--border-soft);
            resize: none;
        }

        .btn-reconnect {
            background: var(--accent-primary);
            color: var(--text-on-accent);
            border: none;
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<section class="standard-container-wide">

    <div class="video-main-frame">
        <div id="jitsi-container"></div>
    </div>

    <div th:if="${isAdmin}" class="session-info-bar">
        <div class="timer-container">
            <span class="status-icon active"></span>
            Час сесії: <span id="session-timer">00:00:00</span>
        </div>
        <div id="save-status" class="status-text-muted">Дані синхронізовано</div>
    </div>

    <div th:if="${isAdmin}" class="notes-bottom-panel">
        <header class="notes-header">
            <h4 class="profile-section-title" th:text="'Нотатки: ' + ${client.name}">Клієнт</h4>
        </header>

        <textarea id="session-notes"
                  class="therapy-textarea"
                  th:text="${lastNoteContent}"></textarea>
    </div>
</section>

<th:block th:fragment="page-scripts">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <script src="https://8x8.vc/external_api.js"></script>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', () => {
            // Отримуємо змінні з бекенду (Thymeleaf)
            const roomName = /*[[${roomName}]]*/ 'default-room';
            const userName = /*[[${currentUser.name}]]*/ 'Користувач';
            const clientUuid = /*[[${client.id}]]*/ '';
            const jitsiJwt = /*[[${jitsiJwt}]]*/ null;

            // Ваш унікальний App ID зі скріншоту
            const appId = 'vpaas-magic-cookie-a6c49e33cd42404bb9c7e3d27f7825c6';

            let jitsiApi = null;

// --- 1. Ініціалізація Jitsi (Виправлена версія без дублікатів) ---
            const initJitsi = () => {
                const container = document.querySelector('#jitsi-container');
                if (!container) {
                    console.error("Помилка: Контейнер для відео не знайдено.");
                    return;
                }

                // Створюємо ОДИН об'єкт з налаштуваннями
                const options = {
                    roomName: `${appId}/${roomName}`,
                    jwt: jitsiJwt, // Тут ваш токен з бекенду
                    width: '100%',
                    height: '100%',
                    parentNode: container,
                    userInfo: { displayName: userName },
                    configOverwrite: {
                        prejoinPageEnabled: false,
                        disableDeepLinking: true,
                        startWithAudioMuted: false,
                        startWithVideoMuted: false
                    },
                    interfaceConfigOverwrite: {
                        SHOW_JITSI_WATERMARK: false,
                        SHOW_BRAND_WATERMARK: false,
                        TILE_VIEW_MAX_COLUMNS: 2,
                        DEFAULT_REMOTE_DISPLAY_NAME: 'Клієнт'
                    }
                };

                const domain = "8x8.vc";

                // Створюємо зв'язок. Використовуємо глобальну змінну jitsiApi
                jitsiApi = new JitsiMeetExternalAPI(domain, options);

                // Додаємо слухача подій для автоматичної "плитки"
                jitsiApi.addEventListener('videoConferenceJoined', () => {
                    jitsiApi.executeCommand('toggleTileView');
                    console.log("Сесію розпочато.");
                });
            };

            // Запускаємо функцію
            initJitsi();

            // ТУТ ВАШ КОД ЗАКІНЧУЄТЬСЯ І ПОЧИНАЄТЬСЯ ТАЙМЕР
            // --- 2. Логіка Таймера (Тільки якщо є елемент на сторінці) ---
            const timerElement = document.getElementById('session-timer');
            if (timerElement) {
                let seconds = 0;
                setInterval(() => {
                    seconds++;
                    const hrs = String(Math.floor(seconds / 3600)).padStart(2, '0');
                    const mins = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
                    const secs = String(seconds % 60).padStart(2, '0');
                    timerElement.innerText = `${hrs}:${mins}:${secs}`;
                }, 1000);
            }

            // --- 3. Автозбереження нотаток (Тільки для ADMIN) ---
            const notesArea = document.getElementById('session-notes');
            if (notesArea) {
                const statusLabel = document.getElementById('save-status');
                const csrfToken = document.querySelector('meta[name="_csrf"]').content;
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

                let saveTimeout = null;

                notesArea.addEventListener('input', () => {
                    // Показуємо статус, що процес пішов
                    statusLabel.innerText = "Зберігаю...";
                    statusLabel.style.color = "var(--text-secondary)";

                    clearTimeout(saveTimeout);

                    // Відкладаємо збереження на 2 секунди після останнього символу
                    saveTimeout = setTimeout(async () => {
                        try {
                            const response = await fetch(`/therapy/notes/save/${clientUuid}`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'text/plain;charset=UTF-8',
                                    [csrfHeader]: csrfToken
                                },
                                body: notesArea.value
                            });

                            if (response.ok) {
                                statusLabel.innerText = "Дані синхронізовано";
                                statusLabel.style.color = "var(--status-success)";
                            } else {
                                throw new Error('Server error');
                            }
                        } catch (e) {
                            console.error("Autosave error:", e);
                            statusLabel.innerText = "Помилка збереження";
                            statusLabel.style.color = "var(--status-error)";
                        }
                    }, 2000);
                });
            }
        });
    </script>
</th:block>
</body>
</html>
